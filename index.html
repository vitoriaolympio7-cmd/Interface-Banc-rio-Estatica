<!DOCTYPE html>


<html lang="pt-br">


<head>

   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Banco Dev</title>
  
   <!--CONEXÃO COM O CSS-->

   <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container"> <!--Agrupa tudo como se fosse um celular-->

<!--Bloco 1: Topo-->


<div class="topo">
<!--DIV = caixa / bloco generico-->
 
  <h2>Banco Dev</h2> <!--Mais cara de app-->
  <p> Bem-Vindo, Vitoria</p> <!--Descrição-->

</div>


  <!--Bloco 2: Saldo-->

  <div class="saldo">
  
    <span>Saldo Disponivel</span> <!--Melhora o alinhamento-->
    <h2>R$2.000,00</h2> <!--Valor em Destaque-->
 
  </div>

  <!--Bloco 3: Ações-->

  <div class="acoes">

    <button>Transferir</button>
    <button>Pagar</button>
    <button>Extrato</button>

 </div>

  <!--Bloco 4: Transações-->

<div class="transacoes">
    <h3>Ultimas transações</h3>

<!--Cada transação virou um bloco separado-->
  <div class="item">
    <span>Pix Enviado</span>
    <span>- R$100,00</span>
 </div>
   
  <div class="item">
    <span>Boleto Pago</span>
    <span>-R$200,00</span>
  </div>

<div class="item">
    <span> Transferencia recebida</span>
    <span>+R$500</span>
  

  </div>

<!--Bloco extra tipo app-->

 <div class="card">
   <p>Cartão de Crédito</p>
   <h3>R$500.00,00</h3>
 </div>

 <div class="card destaque">
    <p>Dica Inteligente</p>
    <h3>Você gastou menos essa semana</h3>
    <span>Continue economizando</span>
 </div>
 
</div> <!--Div final do container-->


</body>
</html>
